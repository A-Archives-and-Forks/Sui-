name: Module Release

on:
  workflow_call:
    inputs:
      release_type:
        required: true
        type: string
      nightly_tag:
        required: true
        type: string
      version_name:
        required: true
        type: string
      version_code:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      commit_url:
        required: true
        type: string
      build_duration:
        required: true
        type: string
      release_zip_name:
        required: true
        type: string
      debug_zip_name:
        required: true
        type: string
      release_sha256:
        required: true
        type: string
      debug_sha256:
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  nightly:
    name: Update nightly release
    runs-on: ubuntu-24.04
    if: ${{ inputs.release_type == 'nightly' }}

    steps:
      - name: Download module zips
        uses: actions/download-artifact@v8
        with:
          name: module-zips
          path: dist/zips

      - name: Download build metadata
        uses: actions/download-artifact@v8
        with:
          name: build-metadata
          path: dist/metadata

      - name: Delete old Nightly assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIGHTLY_TAG: ${{ inputs.nightly_tag }}
        run: |
          set -euo pipefail

          RELEASE_JSON="$(gh api "repos/${{ github.repository }}/releases/tags/${NIGHTLY_TAG}" 2>/dev/null || true)"
          RELEASE_ID="$(echo "$RELEASE_JSON" | jq -r '.id // empty')"

          if [ -z "$RELEASE_ID" ]; then
            echo "Nightly release does not exist, skip asset deletion."
            exit 0
          fi

          gh api --paginate "repos/${{ github.repository }}/releases/${RELEASE_ID}/assets" --jq '.[].id' |
          while read -r ASSET_ID; do
            [ -n "$ASSET_ID" ] || continue
            echo "Delete old asset: $ASSET_ID"
            gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${ASSET_ID}"
          done

      - name: Prepare Nightly release note
        env:
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          COMMIT_URL: ${{ inputs.commit_url }}
          BUILD_DURATION: ${{ inputs.build_duration }}
          RELEASE_ZIP_NAME: ${{ inputs.release_zip_name }}
          DEBUG_ZIP_NAME: ${{ inputs.debug_zip_name }}
          RELEASE_SHA256: ${{ inputs.release_sha256 }}
          DEBUG_SHA256: ${{ inputs.debug_sha256 }}
        run: |
          set -euo pipefail

          {
            echo "# Nightly Build"
            echo
            echo "- **Version:** \`${VERSION_NAME}\`"
            echo "- **VersionCode:** \`${VERSION_CODE}\`"
            echo "- **Commit:** [\`${COMMIT_SHA}\`](${COMMIT_URL})"
            echo "- **Build time:** \`${BUILD_DURATION}\`"
            echo
            echo "## Assets"
            echo
            echo "- \`${RELEASE_ZIP_NAME}\`"
            echo "- \`${DEBUG_ZIP_NAME}\`"
            echo
            echo "## SHA256"
            echo
            echo "- Release: \`${RELEASE_SHA256}\`"
            echo "- Debug: \`${DEBUG_SHA256}\`"
            echo
            echo "## Message"
            echo
            echo '```text'
            cat dist/metadata/commit-message.txt
            echo '```'
          } > nightly-release-note.md

      - name: Update Nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.nightly_tag }}
          name: Nightly Build
          body_path: nightly-release-note.md
          draft: false
          prerelease: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/zips/Sui-*-release.zip
            dist/zips/Sui-*-debug.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag:
    name: Create tag release
    runs-on: ubuntu-24.04
    if: ${{ inputs.release_type == 'tag' }}

    steps:
      - name: Download module zips
        uses: actions/download-artifact@v8
        with:
          name: module-zips
          path: dist/zips

      - name: Download build metadata
        uses: actions/download-artifact@v8
        with:
          name: build-metadata
          path: dist/metadata

      - name: Prepare tag release note
        env:
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          COMMIT_URL: ${{ inputs.commit_url }}
          BUILD_DURATION: ${{ inputs.build_duration }}
          RELEASE_ZIP_NAME: ${{ inputs.release_zip_name }}
          DEBUG_ZIP_NAME: ${{ inputs.debug_zip_name }}
          RELEASE_SHA256: ${{ inputs.release_sha256 }}
          DEBUG_SHA256: ${{ inputs.debug_sha256 }}
        run: |
          set -euo pipefail

          {
            echo "# Release"
            echo
            echo "- **Version:** \`${VERSION_NAME}\`"
            echo "- **VersionCode:** \`${VERSION_CODE}\`"
            echo "- **Commit:** [\`${COMMIT_SHA}\`](${COMMIT_URL})"
            echo "- **Build time:** \`${BUILD_DURATION}\`"
            echo
            echo "## Assets"
            echo
            echo "- \`${RELEASE_ZIP_NAME}\`"
            echo "- \`${DEBUG_ZIP_NAME}\`"
            echo
            echo "## SHA256"
            echo
            echo "- Release: \`${RELEASE_SHA256}\`"
            echo "- Debug: \`${DEBUG_SHA256}\`"
            echo
            echo "## Message"
            echo
            echo '```text'
            cat dist/metadata/commit-message.txt
            echo '```'
          } > tag-release-note.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: false
          body_path: tag-release-note.md
          fail_on_unmatched_files: true
          files: |
            dist/zips/Sui-*-release.zip
            dist/zips/Sui-*-debug.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}