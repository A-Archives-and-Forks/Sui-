name: KernelSU Release

on:
  workflow_call:
    inputs:
      main_repo:
        required: true
        type: string
      ksu_target_repo:
        required: true
        type: string
      version_name:
        required: true
        type: string
      version_code:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      commit_full_sha:
        required: true
        type: string
      build_duration:
        required: true
        type: string
      release_zip_name:
        required: true
        type: string
      release_sha256:
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  ksu-release:
    name: Sync KernelSU community release
    runs-on: ubuntu-24.04

    steps:
      - name: Download module zips
        uses: actions/download-artifact@v8
        with:
          name: module-zips
          path: dist/zips

      - name: Download build metadata
        uses: actions/download-artifact@v8
        with:
          name: build-metadata
          path: dist/metadata

      - name: Create immutable KernelSU release
        env:
          GH_TOKEN: ${{ secrets.KSU_REPO_TOKEN }}
          TARGET_REPO: ${{ inputs.ksu_target_repo }}
          MAIN_REPO: ${{ inputs.main_repo }}
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          COMMIT_FULL_SHA: ${{ inputs.commit_full_sha }}
          BUILD_DURATION: ${{ inputs.build_duration }}
          RELEASE_ZIP_NAME: ${{ inputs.release_zip_name }}
          RELEASE_SHA256: ${{ inputs.release_sha256 }}
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN:-}"

          MAIN_REPO_URL="https://github.com/${MAIN_REPO}"
          COMMIT_URL="${MAIN_REPO_URL}/commit/${COMMIT_FULL_SHA}"
          RELEASE_ZIP="dist/zips/${RELEASE_ZIP_NAME}"
          COMMUNITY_TAG="v${VERSION_CODE}-${COMMIT_SHA}"

          test -f "$RELEASE_ZIP"

          {
            echo "同步 [自主仓库](${MAIN_REPO_URL}) 构建产物喵"
            echo
            echo "- **Version:** \`${VERSION_NAME}\`"
            echo "- **VersionCode:** \`${VERSION_CODE}\`"
            echo "- **Commit:** [\`${COMMIT_SHA}\`](${COMMIT_URL})"
            echo "- **Build time:** \`${BUILD_DURATION}\`"
            echo "- **SHA256:** \`${RELEASE_SHA256}\`"
            echo
            echo "## Message"
            echo
            echo '```text'
            cat dist/metadata/commit-message.txt
            echo '```'
          } > community-release-note.md

          if gh release view "$COMMUNITY_TAG" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            echo "Release $COMMUNITY_TAG already exists in $TARGET_REPO, skip."
            exit 0
          fi

          gh release create "$COMMUNITY_TAG" "$RELEASE_ZIP" \
            --repo "$TARGET_REPO" \
            --title "$VERSION_NAME" \
            --notes-file community-release-note.md